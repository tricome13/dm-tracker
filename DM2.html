<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM経過報告トラッカー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 24px 16px; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .sc { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; padding: 14px; }
  .sc-label { font-size: 11px; color: #999; margin-bottom: 6px; }
  .sc-val { font-size: 24px; font-weight: 500; }
  .form-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 140px 110px 1fr 80px 80px 80px auto; gap: 10px; align-items: end; }
  .ff { display: flex; flex-direction: column; gap: 4px; }
  .ff label { font-size: 11px; color: #999; }
  .ff input, .ff select { font-size: 13px; font-family: inherit; color: #1a1a1a; background: #fafaf8; border: 1px solid #ddd; border-radius: 8px; padding: 7px 10px; outline: none; width: 100%; transition: border-color 0.15s; }
  .ff input:focus, .ff select:focus { border-color: #185FA5; background: #fff; }
  .btn-add { font-size: 13px; font-family: inherit; background: #185FA5; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-weight: 500; white-space: nowrap; height: 36px; transition: background 0.15s; }
  .btn-add:hover { background: #0C447C; }
  .action-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .btn-line { font-size: 13px; font-family: inherit; background: #3B6D11; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-weight: 500; transition: background 0.15s; }
  .btn-line:hover { background: #27500A; }
  .btn-clear { font-size: 13px; font-family: inherit; background: transparent; color: #999; border: 1px solid #ddd; border-radius: 8px; padding: 8px 14px; cursor: pointer; transition: all 0.15s; }
  .btn-clear:hover { color: #E24B4A; border-color: #E24B4A; }
  .save-status { font-size: 12px; color: #aaa; margin-left: auto; }
  .tbl-wrap { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  col.c-date { width: 88px; } col.c-time { width: 66px; } col.c-media { width: 88px; } col.c-send { width: 64px; }
  col.c-rep { width: 64px; } col.c-repp { width: 74px; } col.c-apo { width: 70px; }
  col.c-apop { width: 80px; } col.c-del { width: 36px; }
  thead { background: #f5f5f0; }
  th { padding: 10px 12px; text-align: left; font-weight: 500; font-size: 11px; color: #888; border-bottom: 1px solid #e8e8e4; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0ec; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fafaf8; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .b-low { background: #FCEBEB; color: #A32D2D; }
  .b-mid { background: #FAEEDA; color: #633806; }
  .b-ok  { background: #EAF3DE; color: #27500A; }
  .btn-del { background: none; border: none; cursor: pointer; color: #ccc; font-size: 14px; padding: 3px 5px; border-radius: 4px; transition: all 0.15s; }
  .btn-del:hover { color: #E24B4A; background: #FCEBEB; }
  .foot-row td { background: #f5f5f0; font-weight: 500; border-top: 1px solid #e0e0dc; border-bottom: none; }
  .empty-row td { text-align: center; color: #bbb; font-size: 13px; padding: 32px; }
  .preview-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; overflow: hidden; display: none; }
  .preview-header { background: #f5f5f0; padding: 10px 14px; font-size: 12px; font-weight: 500; color: #666; border-bottom: 1px solid #e8e8e4; display: flex; justify-content: space-between; align-items: center; }
  .copy-btn { font-size: 12px; font-family: inherit; background: #185FA5; color: #fff; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: background 0.15s; }
  .copy-btn:hover { background: #0C447C; }
  #preview-ta { width: 100%; font-size: 13px; font-family: 'Courier New', monospace; color: #1a1a1a; background: #fff; border: none; outline: none; padding: 14px; line-height: 1.8; resize: none; }
  @media (max-width: 600px) {
    .summary { grid-template-columns: repeat(2,1fr); }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-grid .btn-add { grid-column: span 2; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📊 DM経過報告トラッカー</h1>
  <p class="subtitle">データはブラウザに自動保存されます</p>
  <div class="summary">
    <div class="sc"><div class="sc-label">総送信数</div><div class="sc-val" id="s-send">0</div></div>
    <div class="sc"><div class="sc-label">総返信数</div><div class="sc-val" id="s-rep">0</div></div>
    <div class="sc"><div class="sc-label">平均返信率</div><div class="sc-val" id="s-repp">0%</div></div>
    <div class="sc"><div class="sc-label">総アポ獲得</div><div class="sc-val" id="s-apo">0</div></div>
  </div>
  <div class="form-card">
    <div class="form-grid">
      <div class="ff"><label>日付</label><input type="date" id="f-date"></div>
      <div class="ff"><label>時刻</label><input type="time" id="f-time"></div>
      <div class="ff"><label>媒体</label>
        <select id="f-media">
          <option>Facebook</option><option>Instagram</option>
          <option>X (Twitter)</option><option>LinkedIn</option>
          <option>Threads</option><option>その他</option>
        </select>
      </div>
      <div class="ff"><label>送信数</label><input type="number" id="f-send" min="0" placeholder="0"></div>
      <div class="ff"><label>返信数</label><input type="number" id="f-rep" min="0" placeholder="0"></div>
      <div class="ff"><label>アポ獲得</label><input type="number" id="f-apo" min="0" placeholder="0"></div>
      <button class="btn-add" onclick="addRow()">追加</button>
    </div>
  </div>
  <div class="action-row">
    <button class="btn-line" onclick="showReport()">LINE用レポートを生成</button>
    <button class="btn-clear" onclick="clearAll()">全データ削除</button>
    <span class="save-status" id="save-status"></span>
  </div>
  <div class="tbl-wrap">
    <table>
      <colgroup>
        <col class="c-date"><col class="c-time"><col class="c-media"><col class="c-send">
        <col class="c-rep"><col class="c-repp"><col class="c-apo">
        <col class="c-apop"><col class="c-del">
      </colgroup>
      <thead>
        <tr><th>日付</th><th>時刻</th><th>媒体</th><th>送信数</th><th>返信数</th><th>返信率</th><th>アポ獲得</th><th>アポ獲得率</th><th></th></tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot id="tfoot"></tfoot>
    </table>
  </div>
  <div class="preview-card" id="preview-card">
    <div class="preview-header">
      <span>LINE用レポート</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <span style="font-size:11px;color:#aaa;font-weight:400">クリックで全選択</span>
        <button class="copy-btn" onclick="copyText()">コピー</button>
      </div>
    </div>
    <textarea id="preview-ta" readonly onclick="this.select()"></textarea>
  </div>
</div>
<script>
const STORAGE_KEY = 'dm_tracker_rows';
let rows = [];
function load() { try { const s = localStorage.getItem(STORAGE_KEY); if (s) rows = JSON.parse(s); } catch(e) { rows = []; } }
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(rows)); }
  catch(e) {}
  const el = document.getElementById('save-status');
  el.textContent = '保存済み ✓';
  setTimeout(() => { el.textContent = ''; }, 2000);
}
function pctDisp(a,b) { return b>0?(a/b*100).toFixed(2)+'%':'0.00%'; }
function pct(a,b) { return b>0?(a/b*100).toFixed(2)+'%':'—'; }
function badge(val) {
  if (val==='—') return `<span style="color:#bbb">—</span>`;
  const n=parseFloat(val), cls=n<1?'b-low':n<3?'b-mid':'b-ok';
  return `<span class="badge ${cls}">${val}</span>`;
}
function buildLineText() {
  const d=new Date();
  const dateStr=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
  const timeStr=`${d.getHours()}時${String(d.getMinutes()).padStart(2,'0')}分`;
  const sep='━━━━━━━━━━━━━━━';
  let lines=[`📊 DM経過報告`,`${dateStr} ${timeStr}現在`,sep];
  rows.forEach(r=>{
    const timeLabel = r.time ? ` ${r.time}現在` : '';
    lines.push(`【${r.media}】${timeLabel}`);
    lines.push(`送付 ${r.send}件 / 返信${r.rep}件　返信率　${pctDisp(r.rep,r.send)}`);
    lines.push(`アポ獲得 ${r.apo}件　アポ獲得率　${pctDisp(r.apo,r.send)}`);
    lines.push(sep);
  });
  const ts=rows.reduce((a,r)=>a+r.send,0), tr=rows.reduce((a,r)=>a+r.rep,0), ta=rows.reduce((a,r)=>a+r.apo,0);
  lines.push(`【合計】`);
  lines.push(`送付 ${ts}件 / 返信${tr}件　返信率　${pctDisp(tr,ts)}`);
  lines.push(`アポ獲得 ${ta}件　アポ獲得率　${pctDisp(ta,ts)}`);
  return lines.join('\n');
}
function showReport() {
  if (!rows.length) return;
  const text=buildLineText(), ta=document.getElementById('preview-ta');
  ta.value=text; ta.rows=text.split('\n').length+1;
  document.getElementById('preview-card').style.display='block';
  ta.select();
}
function copyText() {
  const ta=document.getElementById('preview-ta'); ta.select();
  try { navigator.clipboard.writeText(ta.value).catch(()=>document.execCommand('copy')); }
  catch(e) { document.execCommand('copy'); }
  const btn=document.querySelector('.copy-btn');
  btn.textContent='コピー済み！';
  setTimeout(()=>{ btn.textContent='コピー'; },2000);
}
function render() {
  const tbody=document.getElementById('tbody'), tfoot=document.getElementById('tfoot');
  if (!rows.length) {
    tbody.innerHTML=`<tr class="empty-row"><td colspan="9">データがありません。上のフォームから追加してください。</td></tr>`;
    tfoot.innerHTML=''; updateSummary(0,0,0); return;
  }
  tbody.innerHTML=rows.map((r,i)=>{
    const rp=pct(r.rep,r.send), ap=pct(r.apo,r.send);
    return `<tr><td>${r.date.replace(/-/g,'/')}</td><td>${r.time||'—'}</td><td>${r.media}</td><td>${r.send}</td><td>${r.rep}</td><td>${badge(rp)}</td><td>${r.apo}</td><td>${badge(ap)}</td><td><button class="btn-del" onclick="delRow(${i})">✕</button></td></tr>`;
  }).join('');
  const ts=rows.reduce((a,r)=>a+r.send,0), tr=rows.reduce((a,r)=>a+r.rep,0), ta=rows.reduce((a,r)=>a+r.apo,0);
  tfoot.innerHTML=`<tr class="foot-row"><td colspan="3">合計</td><td>${ts}</td><td>${tr}</td><td>${badge(pct(tr,ts))}</td><td>${ta}</td><td>${badge(pct(ta,ts))}</td><td></td></tr>`;
  updateSummary(ts,tr,ta);
}
function updateSummary(ts,tr,ta) {
  document.getElementById('s-send').textContent=ts;
  document.getElementById('s-rep').textContent=tr;
  document.getElementById('s-repp').textContent=ts>0?(tr/ts*100).toFixed(1)+'%':'0%';
  document.getElementById('s-apo').textContent=ta;
}
function addRow() {
  const date=document.getElementById('f-date').value, time=document.getElementById('f-time').value, media=document.getElementById('f-media').value;
  const send=parseInt(document.getElementById('f-send').value)||0, rep=parseInt(document.getElementById('f-rep').value)||0, apo=parseInt(document.getElementById('f-apo').value)||0;
  if (!date||send===0) { const el=document.getElementById('f-date'); el.style.borderColor='#E24B4A'; setTimeout(()=>{el.style.borderColor='';},1500); return; }
  rows.push({date,time,media,send,rep,apo});
  rows.sort((a,b)=>a.date.localeCompare(b.date));
  ['f-send','f-rep','f-apo'].forEach(id=>document.getElementById(id).value='');
  render(); save();
}
function delRow(i) { if (!confirm('このデータを削除しますか？')) return; rows.splice(i,1); render(); save(); }
function clearAll() { if (!confirm('全データを削除しますか？この操作は元に戻せません。')) return; rows=[]; render(); save(); document.getElementById('preview-card').style.display='none'; }
const now=new Date();
const y=now.getFullYear(), mo=String(now.getMonth()+1).padStart(2,'0'), d=String(now.getDate()).padStart(2,'0');
document.getElementById('f-date').value=`${y}-${mo}-${d}`;
document.getElementById('f-time').value=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
load(); render();
</script>
</body>
</html>
